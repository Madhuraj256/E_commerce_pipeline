
# -------------------------
# Airflow Common Config
# -------------------------
x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: docker/Dockerfile
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__WEBSERVER__SECRET_KEY: my_super_secret_key
  volumes:
    - /d/ecommerce-pipeline/dags:/opt/airflow/dags
    - /d/ecommerce-pipeline/plugins:/opt/airflow/plugins
    - /d/ecommerce-pipeline:/opt/project
    - /var/run/docker.sock:/var/run/docker.sock 
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

# -------------------------
# SERVICES
# -------------------------
services:

  # 🔴 Postgres (Airflow DB)
  postgres:
    image: postgres:13
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5

  # 🟡 Airflow Init (create DB + user)
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username airflow \
          --password airflow \
          --firstname Madhu \
          --lastname User \
          --role Admin \
          --email admin@example.com
    user: "0:0"

  # 🔵 Airflow Webserver
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8088:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # 🟣 Airflow Scheduler
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # -------------------------
  # 🟢 Spark Cluster
  # -------------------------

  bd-pyspark-jupyter:
    image: easewithdata/pyspark-jupyter-lab-old
    container_name: bd-pyspark-jupyter-lab
    ports:
      - "8888:8888"
      - "4040:4040"
    working_dir: /opt/project
    command: jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root --notebook-dir=/opt/project
    volumes:
      - /d/ecommerce-pipeline:/opt/project:rw

  bd-spark-master:
    image: bde2020/spark-master:3.3.0-hadoop3.3
    container_name: bd-spark-master
    ports:
      - "8080:8080"
      - "7077:7077"
    environment:
      - INIT_DAEMON_STEP=setup_spark
    volumes:
      - /d/ecommerce-pipeline:/opt/project:rw

  bd-spark-worker-1:
    image: bde2020/spark-worker:3.3.0-hadoop3.3
    container_name: bd-spark-worker-1
    depends_on:
      - bd-spark-master
    ports:
      - "8081:8081"
    environment:
      - SPARK_MASTER=spark://bd-spark-master:7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2G
    volumes:
      - /d/ecommerce-pipeline:/opt/project:rw

  bd-spark-worker-2:
    image: bde2020/spark-worker:3.3.0-hadoop3.3
    container_name: bd-spark-worker-2
    depends_on:
      - bd-spark-master
    ports:
      - "8082:8081"
    environment:
      - SPARK_MASTER=spark://bd-spark-master:7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2G
    volumes:
      - /d/ecommerce-pipeline:/opt/project:rw

  bd-spark-history-server:
    image: bde2020/spark-history-server:3.3.0-hadoop3.3
    container_name: bd-spark-history-server
    depends_on:
      - bd-spark-master
    ports:
      - "18081:18081"
    volumes:
      - /d/ecommerce-pipeline/data/spark-events:/tmp/spark-events

# -------------------------
# Volumes
# -------------------------
volumes:
  postgres_data: